apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: prod-app
  template:
    metadata:
      labels:
        app: prod-app
    spec:
      containers:
      - name: prod-container
        image: us-east4-docker.pkg.dev/qwiklabs-gcp-01-7d219fff1eb4/my-repository/sample-app:v1.0
        ports:
        - containerPort: 8080
