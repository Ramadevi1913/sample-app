steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-east4-docker.pkg.dev/qwiklabs-gcp-01-7d219fff1eb4/my-repository/sample-app:v1.0', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-east4-docker.pkg.dev/qwiklabs-gcp-01-7d219fff1eb4/my-repository/sample-app:v1.0']

- name: 'gcr.io/cloud-builders/kubectl'
  args: ['apply', '-f', 'dev/deployment.yaml']
  env:
  - 'CLOUDSDK_COMPUTE_ZONE=us-east4-c'
  - 'CLOUDSDK_CONTAINER_CLUSTER=hello-cluster'

images:
- 'us-east4-docker.pkg.dev/qwiklabs-gcp-01-7d219fff1eb4/my-repository/sample-app:v1.0'

options:
  logging: CLOUD_LOGGING_ONLY
